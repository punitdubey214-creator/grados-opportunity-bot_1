
name: RSS Fetch

on:

workflow_dispatch:

schedule:
- cron: '0 9 * * *'

jobs:

fetch:

```
runs-on: ubuntu-latest

steps:

  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 20

  - run: npm install

  - run: node rss-fetch.js
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
```
